<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Транспортная игра | Для детей с ОВЗ</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation;
        }
        body {
            background: linear-gradient(145deg, #b8dcff 0%, #d6edff 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .game-container {
            max-width: 750px;
            width: 100%;
            background: #fffaf0;
            border-radius: 70px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
            padding: 20px 18px 30px;
            border: 4px solid #ffcd94;
        }
        h1 {
            font-size: 2.4rem;
            margin: 0 0 5px;
            text-align: center;
            color: #ff8c42;
            text-shadow: 2px 2px 0 #ffdd99;
        }
        .sub {
            text-align: center;
            font-size: 1.2rem;
            background: #ffefcf;
            display: inline-block;
            width: auto;
            margin: 0 auto 15px;
            padding: 5px 20px;
            border-radius: 40px;
            color: #b45a1a;
            font-weight: bold;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e9dbc4;
            border-radius: 60px;
            padding: 8px 18px;
            margin: 10px 0 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .counter {
            background: #ff9f4a;
            padding: 6px 22px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.5rem;
            color: white;
        }
        .stars {
            font-size: 1.8rem;
            letter-spacing: 5px;
        }
        .restart-btn {
            background: #3f9eff;
            border: none;
            font-size: 1.2rem;
            padding: 6px 18px;
            border-radius: 50px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 3px 0 #1a5c9e;
            transition: 0.05s linear;
        }
        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1a5c9e;
        }
        .question-card {
            background: #fffaec;
            border-radius: 65px;
            padding: 20px 12px;
            text-align: center;
            border: 2px solid #ffcd82;
            margin: 12px 0;
            box-shadow: inset 0 0 0 3px #fff5e0, 0 8px 12px rgba(0,0,0,0.05);
        }
        .q-icon {
            font-size: 3.5rem;
            margin-bottom: 8px;
        }
        .q-text {
            font-size: 1.8rem;
            font-weight: bold;
            background: #ffefcf;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            color: #a05000;
        }
        .sound-button {
            background: #f7b05e;
            border: none;
            font-size: 1.6rem;
            padding: 12px 25px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 15px auto 0;
            display: inline-flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 5px 0 #9b4a0e;
            font-family: inherit;
        }
        .sound-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #9b4a0e;
        }
        .options-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 15px;
        }
        .option-card {
            background: white;
            flex: 1;
            min-width: 200px;
            max-width: 280px;
            border-radius: 55px;
            padding: 18px 12px 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 12px 18px rgba(0, 0, 0, 0.1);
            border: 3px solid #ffe2b5;
            transition: 0.07s linear;
        }
        .option-card:active {
            transform: scale(0.97);
            background: #fff4e0;
        }
        .option-svg {
            width: 130px;
            height: 130px;
            margin: 0 auto;
            display: block;
        }
        .option-emoji {
            font-size: 5rem;
            display: block;
            margin-bottom: 12px;
        }
        .option-label {
            font-size: 1.7rem;
            font-weight: bold;
            background: #fff0da;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 40px;
            color: #5f3b00;
        }
        .feedback {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 12px;
            border-radius: 60px;
            margin: 10px 0;
            background: #fee3b5;
            color: #be5e00;
        }
        .finish-screen {
            text-align: center;
            background: #c8e6b0;
            border-radius: 60px;
            padding: 20px;
            margin-top: 15px;
        }
        .finish-screen h2 {
            font-size: 2.2rem;
            margin: 0;
            color: #2b6e2b;
        }
        .again-button {
            background: #ffa047;
            font-size: 1.6rem;
            padding: 12px 28px;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }
        .road-icon {
            width: 80px;
            height: 40px;
            background: #2c2c2c;
            border-radius: 10px;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 2px 0 #555;
        }
        .road-icon::before {
            content: "⬜⬜";
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 20px;
            letter-spacing: 8px;
            color: #FFD966;
        }
        @media (max-width: 550px) {
            .game-container { padding: 15px; }
            .option-svg { width: 100px; height: 100px; }
            .option-emoji { font-size: 4rem; }
            .q-text { font-size: 1.4rem; }
            .option-label { font-size: 1.4rem; }
            .sound-button { font-size: 1.3rem; padding: 10px 18px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot">
    <h1>🚦 Транспортная игра 🚜</h1>
    <div style="text-align: center"><span class="sub">Слушай, смотри, выбирай!</span></div>
    <div class="top-bar">
        <div class="counter" id="questionCounter">Вопрос 1 / 17</div>
        <div class="stars" id="starDisplay">⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️</div>
        <button class="restart-btn" id="restartGameBtn">🔄 Сначала</button>
    </div>
    <div class="question-card">
        <div class="q-icon" id="questionIcon">🔊</div>
        <div class="q-text" id="questionText">Чей звук?</div>
        <div id="dynamicZone"></div>
    </div>
    <div id="optionsArea" class="options-row"></div>
    <div id="feedbackMsg" class="feedback">👆 Нажми на картинку, чтобы ответить!</div>
</div>

<script>
    // ---------- SVG для деталей ----------
    const svgWheel = () => `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="38" fill="#555" stroke="#222" stroke-width="4"/><circle cx="50" cy="50" r="28" fill="#999" stroke="#222" stroke-width="3"/><circle cx="50" cy="50" r="12" fill="#DDD"/><line x1="50" y1="22" x2="50" y2="78" stroke="#333" stroke-width="4"/><line x1="22" y1="50" x2="78" y2="50" stroke="#333" stroke-width="4"/><line x1="30" y1="30" x2="70" y2="70" stroke="#333" stroke-width="3"/><line x1="70" y1="30" x2="30" y2="70" stroke="#333" stroke-width="3"/></svg>`;
    const svgSteering = () => `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="35" fill="none" stroke="#9B6A3C" stroke-width="7"/><circle cx="50" cy="50" r="10" fill="#9B6A3C"/><line x1="50" y1="15" x2="50" y2="35" stroke="#9B6A3C" stroke-width="7"/><line x1="50" y1="65" x2="50" y2="85" stroke="#9B6A3C" stroke-width="7"/><line x1="15" y1="50" x2="35" y2="50" stroke="#9B6A3C" stroke-width="7"/><line x1="65" y1="50" x2="85" y2="50" stroke="#9B6A3C" stroke-width="7"/></svg>`;
    const svgHeadlight = () => `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#FFF1A0" stroke="#F4B41A" stroke-width="4"/><circle cx="50" cy="50" r="25" fill="#FFE770" stroke="#D4890A" stroke-width="3"/><rect x="40" y="15" width="20" height="15" fill="#D4AF37" rx="4"/><path d="M30,40 L70,40 L60,70 L40,70 Z" fill="#FFC107" opacity="0.5"/></svg>`;

    // ---------- ЗВУКИ (файлы лежат рядом с HTML) ----------
    function playSound(soundType) {
        let audio = new Audio();
        let soundFile = '';
        switch(soundType) {
            case 'siren': soundFile = 'siren.mp3'; break;
            case 'bike': soundFile = 'bike.mp3'; break;
            case 'steamship': soundFile = 'steamship.mp3'; break;
            case 'car': soundFile = 'car.mp3'; break;
            case 'plane': soundFile = 'plane.mp3'; break;
            case 'helicopter': soundFile = 'helicopter.mp3'; break;
            case 'train': soundFile = 'train.mp3'; break;
            case 'boat': soundFile = 'boat.mp3'; break;
            default: return;
        }
        audio.src = soundFile;
        audio.onerror = () => {
            console.warn(`Не найден звук: ${soundFile}`);
            const fb = document.getElementById("feedbackMsg");
            if (fb) {
                fb.innerHTML = "⚠️ Звук не найден. Проверьте, что файлы .mp3 лежат рядом с игрой. ⚠️";
                fb.style.background = "#ffcfc2";
                setTimeout(() => {
                    if (fb.innerHTML.includes("не найден")) fb.innerHTML = "👆 Нажми на картинку, чтобы ответить!";
                    fb.style.background = "#fee3b5";
                }, 3000);
            }
            playFallbackSound(soundType);
        };
        audio.play().catch(e => {
            console.warn("Ошибка воспроизведения", e);
            playFallbackSound(soundType);
        });
    }

    let activeCtx = null;
    function playFallbackSound(soundType) {
        try {
            if (activeCtx) activeCtx.close();
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            activeCtx = ctx;
            const now = ctx.currentTime;
            const master = ctx.createGain();
            master.connect(ctx.destination);
            master.gain.setValueAtTime(0.3, now);
            master.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
            const beep = (freq, dur, type='sine') => {
                const osc = ctx.createOscillator();
                osc.type = type;
                osc.frequency.value = freq;
                const g = ctx.createGain();
                g.gain.setValueAtTime(0.3, now);
                g.gain.exponentialRampToValueAtTime(0.001, now+dur);
                osc.connect(g);
                g.connect(ctx.destination);
                osc.start();
                osc.stop(now+dur);
            };
            switch(soundType) {
                case 'siren': beep(600,1.1,'sawtooth'); break;
                case 'bike': beep(1800,0.25,'sine'); break;
                case 'steamship': beep(100,1.2,'square'); break;
                case 'car': beep(170,0.9,'triangle'); break;
                case 'plane': beep(320,1.0,'sawtooth'); break;
                case 'helicopter': 
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = 110;
                    osc.connect(master);
                    osc.start();
                    const interval = setInterval(()=>{ osc.frequency.value = osc.frequency.value===110?140:110; },180);
                    setTimeout(()=>{ clearInterval(interval); osc.stop(now+1.0); },1000);
                    break;
                case 'train': beep(130,1.2,'sine'); break;
                case 'boat': beep(210,1.0,'sine'); break;
                default: beep(440,0.5);
            }
        } catch(e) { console.warn("Fallback audio error", e); }
    }

    // ---------- БАЗОВЫЕ ВОПРОСЫ (без перемешивания) ----------
    // Блок 1: ЗВУКИ (8 вопросов)
    const baseSoundQuestions = [
        { type: 'sound', soundType: 'siren', correct: { emoji: "🚑", name: "Скорая помощь", cat: "drive" }, wrong: { emoji: "✈️", name: "Самолёт", cat: "fly" }, feedbackOk: "Правильно! Это сирена скорой! 🚑", feedbackBad: "Нет, это не самолёт. Это скорая помощь!" },
        { type: 'sound', soundType: 'bike', correct: { emoji: "🚲", name: "Велосипед", cat: "drive" }, wrong: { emoji: "🚤", name: "Лодка", cat: "swim" }, feedbackOk: "Верно! Велосипед звенит! 🚲", feedbackBad: "Не угадал. Это звонок велосипеда!" },
        { type: 'sound', soundType: 'steamship', correct: { emoji: "🚢", name: "Пароход", cat: "swim" }, wrong: { emoji: "🚁", name: "Вертолёт", cat: "fly" }, feedbackOk: "Молодец! Пароход гудит! 🚢", feedbackBad: "Нет, это пароход, а не вертолёт." },
        { type: 'sound', soundType: 'car', correct: { emoji: "🚗", name: "Машина", cat: "drive" }, wrong: { emoji: "🚢", name: "Пароход", cat: "swim" }, feedbackOk: "Правильно! Машина заводится! 🚗", feedbackBad: "Это не пароход. Это машина!" },
        { type: 'sound', soundType: 'plane', correct: { emoji: "✈️", name: "Самолёт", cat: "fly" }, wrong: { emoji: "🚗", name: "Машина", cat: "drive" }, feedbackOk: "Отлично! Гул самолёта! ✈️", feedbackBad: "Нет, это не машина. Это самолёт!" },
        { type: 'sound', soundType: 'helicopter', correct: { emoji: "🚁", name: "Вертолёт", cat: "fly" }, wrong: { emoji: "🚲", name: "Велосипед", cat: "drive" }, feedbackOk: "Верно! Вертолёт стрекочет! 🚁", feedbackBad: "Велосипед звучит иначе. Это вертолёт!" },
        { type: 'sound', soundType: 'train', correct: { emoji: "🚂", name: "Поезд", cat: "drive" }, wrong: { emoji: "🚤", name: "Лодка", cat: "swim" }, feedbackOk: "Умница! Поезд едет! 🚂", feedbackBad: "Нет, это поезд, а не лодка." },
        { type: 'sound', soundType: 'boat', correct: { emoji: "🚤", name: "Лодка", cat: "swim" }, wrong: { emoji: "✈️", name: "Самолёт", cat: "fly" }, feedbackOk: "Правильно! Лодка подаёт сигнал! 🚤", feedbackBad: "Не угадал. Это лодка, а не самолёт." }
    ];

    // Блок 2: ДВИЖЕНИЕ (6 вопросов)
    const baseMoveQuestions = [
        { type: 'move', moveCat: 'swim', questionText: "Что плывёт?", picto: "🌊🌊🌊", correct: { emoji: "🚤", name: "Лодка", cat: "swim" }, wrong: { emoji: "🚗", name: "Машина", cat: "drive" }, feedbackOk: "Молодец! Лодка плывёт! 🚤", feedbackBad: "Машина не плывёт. Выбери лодку!" },
        { type: 'move', moveCat: 'swim', questionText: "Что плывёт?", picto: "🌊🌊🌊", correct: { emoji: "🚢", name: "Пароход", cat: "swim" }, wrong: { emoji: "🚁", name: "Вертолёт", cat: "fly" }, feedbackOk: "Верно! Пароход плывёт! 🚢", feedbackBad: "Вертолёт летает, а плывёт пароход!" },
        { type: 'move', moveCat: 'fly', questionText: "Что летит?", picto: "☁️☁️☁️", correct: { emoji: "✈️", name: "Самолёт", cat: "fly" }, wrong: { emoji: "🚤", name: "Лодка", cat: "swim" }, feedbackOk: "Отлично! Самолёт летает! ✈️", feedbackBad: "Лодка не летает. Выбери самолёт!" },
        { type: 'move', moveCat: 'fly', questionText: "Что летит?", picto: "☁️☁️☁️", correct: { emoji: "🚁", name: "Вертолёт", cat: "fly" }, wrong: { emoji: "🚂", name: "Поезд", cat: "drive" }, feedbackOk: "Правильно! Вертолёт летает! 🚁", feedbackBad: "Поезд едет, а летает вертолёт!" },
        { type: 'move', moveCat: 'drive', questionText: "Что едет?", picto: "road", correct: { emoji: "🚗", name: "Машина", cat: "drive" }, wrong: { emoji: "🚢", name: "Пароход", cat: "swim" }, feedbackOk: "Верно! Машина едет по дороге! 🚗", feedbackBad: "Пароход плывёт, а едет машина!" },
        { type: 'move', moveCat: 'drive', questionText: "Что едет?", picto: "road", correct: { emoji: "🚂", name: "Поезд", cat: "drive" }, wrong: { emoji: "✈️", name: "Самолёт", cat: "fly" }, feedbackOk: "Молодец! Поезд едет по рельсам! 🚂", feedbackBad: "Самолёт летает, а едет поезд!" }
    ];

    // Блок 3: ДЕТАЛИ (3 вопроса)
    const basePartQuestions = [
        { type: 'part', questionText: "Где руль?", correct: { svg: svgSteering(), name: "Руль" }, wrong: { svg: svgWheel(), name: "Колесо" }, feedbackOk: "Правильно! Это руль!", feedbackBad: "Нет, это не руль." },
        { type: 'part', questionText: "Где колесо?", correct: { svg: svgWheel(), name: "Колесо" }, wrong: { svg: svgHeadlight(), name: "Фара" }, feedbackOk: "Верно! Это колесо!", feedbackBad: "Это не колесо." },
        { type: 'part', questionText: "Где фара?", correct: { svg: svgHeadlight(), name: "Фара" }, wrong: { svg: svgSteering(), name: "Руль" }, feedbackOk: "Отлично! Это фара!", feedbackBad: "Нет, это не фара." }
    ];

    // Функция перемешивания массива (Fisher-Yates)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Глобальный массив вопросов (будет собран при старте)
    let questions = [];

    function buildShuffledQuestions() {
        // Копируем базовые массивы и перемешиваем каждый
        const shuffledSounds = shuffleArray([...baseSoundQuestions]);
        const shuffledMoves = shuffleArray([...baseMoveQuestions]);
        const shuffledParts = shuffleArray([...basePartQuestions]);
        // Склеиваем в заданном порядке: сначала звуки, потом движение, потом детали
        return [...shuffledSounds, ...shuffledMoves, ...shuffledParts];
    }

    // ---------- Управление игрой ----------
    let currentIndex = 0;
    let waitingForNext = false;
    let gameFinished = false;

    const counterSpan = document.getElementById("questionCounter");
    const starSpan = document.getElementById("starDisplay");
    const qIconDiv = document.getElementById("questionIcon");
    const qTextSpan = document.getElementById("questionText");
    const dynamicZone = document.getElementById("dynamicZone");
    const optionsArea = document.getElementById("optionsArea");
    const feedbackDiv = document.getElementById("feedbackMsg");
    const restartBtn = document.getElementById("restartGameBtn");

    function updateProgress() {
        if (gameFinished) {
            counterSpan.innerText = "Победа!";
            starSpan.innerHTML = "🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆🏆";
            return;
        }
        counterSpan.innerText = `Вопрос ${currentIndex+1} / ${questions.length}`;
        let stars = "";
        for (let i=0; i<questions.length; i++) stars += (i < currentIndex) ? "⭐️" : "☆";
        starSpan.innerHTML = stars;
    }

    function clearAll() { optionsArea.innerHTML = ""; dynamicZone.innerHTML = ""; }
    function getRoadIcon() {
        const div = document.createElement("div");
        div.style.width = "100px"; div.style.height = "45px"; div.style.background = "#2c2c2c";
        div.style.borderRadius = "12px"; div.style.margin = "0 auto"; div.style.position = "relative";
        div.style.boxShadow = "0 2px 0 #555";
        const line = document.createElement("div");
        line.style.position = "absolute"; line.style.top = "18px"; line.style.left = "15px";
        line.style.fontSize = "24px"; line.style.letterSpacing = "8px"; line.style.color = "#FFD966";
        line.innerText = "⬜⬜";
        div.appendChild(line);
        return div;
    }

    function renderCurrent() {
        if (gameFinished) return;
        const q = questions[currentIndex];
        updateProgress();
        if (q.type === 'sound') { qIconDiv.innerHTML = "🔊"; qTextSpan.innerHTML = "Чей звук?"; }
        else if (q.type === 'move') {
            if (q.picto === "road") qIconDiv.innerHTML = "";
            else qIconDiv.innerHTML = q.picto;
            qTextSpan.innerHTML = q.questionText;
        } else if (q.type === 'part') { qIconDiv.innerHTML = "🔍"; qTextSpan.innerHTML = q.questionText; }
        clearAll();

        if (q.type === 'sound') {
            const btn = document.createElement("button");
            btn.className = "sound-button";
            btn.innerHTML = "🔊 ПРОСЛУШАТЬ ЗВУК 🔊";
            btn.addEventListener("click", (e) => { e.stopPropagation(); if (!waitingForNext && !gameFinished) playSound(q.soundType); });
            dynamicZone.appendChild(btn);
        } else if (q.type === 'move') {
            if (q.picto === "road") dynamicZone.appendChild(getRoadIcon());
            else { const p = document.createElement("div"); p.style.fontSize = "3rem"; p.style.margin = "10px auto"; p.innerText = q.picto; dynamicZone.appendChild(p); }
        } else if (q.type === 'part') {
            const hint = document.createElement("div"); hint.style.fontSize = "1.4rem"; hint.style.margin = "8px"; hint.innerText = "⬅️ Выбери деталь";
            dynamicZone.appendChild(hint);
        }

        let opts = [q.correct, q.wrong];
        if (Math.random() > 0.5) opts.reverse();
        opts.forEach(opt => {
            const card = document.createElement("div"); card.className = "option-card";
            if (q.type === 'part') {
                const svgDiv = document.createElement("div"); svgDiv.className = "option-svg"; svgDiv.innerHTML = opt.svg; card.appendChild(svgDiv);
            } else {
                const emojiSpan = document.createElement("div"); emojiSpan.className = "option-emoji"; emojiSpan.innerText = opt.emoji; card.appendChild(emojiSpan);
            }
            const labelSpan = document.createElement("div"); labelSpan.className = "option-label"; labelSpan.innerText = opt.name; card.appendChild(labelSpan);
            card.addEventListener("click", (e) => {
                if (waitingForNext || gameFinished) return;
                const isCorrect = (opt.name === q.correct.name);
                if (isCorrect) {
                    feedbackDiv.innerHTML = `✅ ${q.feedbackOk} ✅`; feedbackDiv.style.background = "#c8e6b5"; feedbackDiv.style.color = "#2b5e2b";
                    waitingForNext = true;
                    setTimeout(() => {
                        if (currentIndex + 1 < questions.length) { currentIndex++; waitingForNext = false; renderCurrent(); feedbackDiv.innerHTML = "👉 Отлично! Следующий вопрос!"; feedbackDiv.style.background = "#fee3b5"; feedbackDiv.style.color = "#be5e00"; }
                        else { gameFinished = true; showFinish(); }
                    }, 1000);
                } else {
                    feedbackDiv.innerHTML = `❌ ${q.feedbackBad} ❌`; feedbackDiv.style.background = "#ffcfc2"; feedbackDiv.style.color = "#ac3a2e";
                    setTimeout(() => { if (!waitingForNext && !gameFinished) { feedbackDiv.innerHTML = "👉 Попробуй ещё раз! Нажми на другую картинку."; feedbackDiv.style.background = "#fee3b5"; feedbackDiv.style.color = "#be5e00"; } }, 1300);
                }
            });
            optionsArea.appendChild(card);
        });
    }

    function showFinish() {
        clearAll(); qIconDiv.innerHTML = "🏆🎉🏆"; qTextSpan.innerHTML = "Ты молодец!";
        const finishDiv = document.createElement("div"); finishDiv.className = "finish-screen";
        finishDiv.innerHTML = `<h2>✨ ПОБЕДА! ✨</h2><p style="font-size:1.5rem;">Ты отлично знаешь транспорт!</p><button id="playAgainFinish" class="again-button">🚀 Играть снова 🚀</button>`;
        optionsArea.appendChild(finishDiv); feedbackDiv.innerHTML = "🎈 Супер! Нажми кнопку, чтобы повторить. 🎈"; updateProgress();
        const againBtn = document.getElementById("playAgainFinish"); if (againBtn) againBtn.addEventListener("click", () => fullRestart());
    }

    function fullRestart() {
        // Пересобираем вопросы заново (каждый блок перемешивается отдельно)
        questions = buildShuffledQuestions();
        currentIndex = 0;
        waitingForNext = false;
        gameFinished = false;
        renderCurrent();
        feedbackDiv.innerHTML = "👆 Нажми на картинку, чтобы ответить!";
        feedbackDiv.style.background = "#fee3b5";
        feedbackDiv.style.color = "#be5e00";
    }

    restartBtn.addEventListener("click", fullRestart);
    // Инициализация
    fullRestart();
</script>
</body>
</html>
